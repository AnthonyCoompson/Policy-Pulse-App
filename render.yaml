services:
  - type: web
    name: policypulse
    runtime: python
    plan: free

    # Build — installs all dependencies from backend-requirements.txt
    # Named backend-requirements.txt (not requirements.txt) so Netlify's
    # auto-detection doesn't try to pip-install the Python backend deps
    # during the frontend static site build.
    buildCommand: pip install -r backend-requirements.txt

    # Start — identical to Railway's startCommand
    startCommand: python main.py

    # Render free tier spins down after 15 min of inactivity.
    # First request after sleep takes ~30 seconds to wake up.
    # For a personal daily-use tool this is completely fine.

    envVars:
      # ── Python runtime ───────────────────────────────────────────────────
      # Pinned explicitly. Without this, Render uses its current default
      # Python version, which can change at any time — that's what broke a
      # prior deploy: Render moved to 3.14, and libsql-experimental has no
      # prebuilt wheel for 3.14, so pip tried to compile it from source and
      # failed (Render's build sandbox disallows the Rust/cargo writes that
      # requires). 3.12.8 is verified to have prebuilt wheels for every
      # package in requirements.txt, so nothing needs to compile from source.
      - key: PYTHON_VERSION
        value: 3.12.8

      # ── Required ─────────────────────────────────────────────────────────
      # Paste your actual values in the Render dashboard under
      # Environment → Add Environment Variable
      # Do NOT paste real keys here — this file goes in your Git repo.

      - key: GEMINI_API_KEY
        sync: false           # you type the value in the Render dashboard

      - key: PP_API_KEY
        sync: false           # same random key you used on Railway

      # ── Database — Turso (persistent) ───────────────────────────────────────
      # Render free tier uses an ephemeral disk — a local SQLite file resets
      # on every redeploy. TURSO_URL / TURSO_TOKEN point the app at a hosted
      # Turso (libSQL) database instead, which persists permanently.
      # Get these from: turso db show policypulse --url
      #                 turso db tokens create policypulse
      - key: TURSO_URL
        sync: false            # starts with libsql://

      - key: TURSO_TOKEN
        sync: false

      # DB_PATH is only used as a local-SQLite fallback if TURSO_URL is ever
      # unset (e.g. local development). Harmless to leave in place.
      - key: DB_PATH
        value: /opt/render/project/src/policypulse.db

      # ── CORS ──────────────────────────────────────────────────────────────
      # Add your Render app URL here once deployed, e.g.:
      # https://policypulse.onrender.com
      - key: ALLOWED_ORIGINS
        value: "*"            # change to your actual URL after first deploy

      # ── Port ─────────────────────────────────────────────────────────────
      - key: PORT
        value: 10000          # Render's default port for web services

      # ── Email / SMTP (optional — only needed for digest sending) ──────────
      # Uncomment and fill in the Render dashboard if you use email sending
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   sync: false
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASSWORD
      #   sync: false
      # - key: SMTP_FROM
      #   sync: false
