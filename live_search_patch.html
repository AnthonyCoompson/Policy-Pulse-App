<!-- ═══════════════════════════════════════════════════════════════════════════
     STEP 1 — CSS
     Paste this INSIDE your existing <style> tag (anywhere near the bottom).
═══════════════════════════════════════════════════════════════════════════════ -->
<style id="live-search-css">

/* ── LIVE SEARCH FORM CARD ── */
.ls-form-card {
  background: linear-gradient(135deg, rgba(11,24,41,0.9), rgba(15,32,64,0.8));
  border: 1px solid rgba(0,194,255,0.2);
  border-radius: 14px;
  padding: 22px 24px 18px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.ls-form-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--gold), var(--cyan), transparent);
  opacity: .7;
}
/* scholarly variant — purple accent */
.ls-form-card.ls-scholarly-card::before {
  background: linear-gradient(90deg, transparent, #8b5cf6, #6366f1, #8b5cf6, transparent);
}
.ls-form-card.ls-scholarly-card {
  border-color: rgba(139,92,246,0.25);
}

/* ── FILTER GRID ── */
.ls-filter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}
.ls-filter-label {
  font-size: 9px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 5px;
}
.ls-filter-label span { color: var(--gold); }

/* ── QUICK PRESET CHIPS STRIP ── */
.ls-presets {
  display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.ls-preset-label {
  font-size: 9px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--dim);
  margin-right: 4px; flex-shrink: 0;
}

/* ── DATABASE TOGGLE CHIPS (scholarly only) ── */
.ls-db-toggle {
  display: inline-flex; align-items: center;
  gap: 5px; padding: 4px 10px;
  border-radius: 5px; border: 1px solid rgba(139,92,246,0.25);
  background: rgba(139,92,246,0.08);
  font-size: 10px; font-weight: 700; color: #a5b4fc;
  cursor: pointer; transition: all .15s; user-select: none;
  letter-spacing: .03em;
}
.ls-db-toggle.active {
  background: rgba(139,92,246,0.22);
  border-color: rgba(139,92,246,0.5);
}
.ls-db-toggle:hover { background: rgba(139,92,246,0.18); }

/* ── RESULT CARD ── */
.ls-card {
  background: linear-gradient(135deg, rgba(11,24,41,0.88), rgba(9,20,38,0.72));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  position: relative;
  transition: all .22s;
}
.ls-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.ls-card.ls-news-card::before      { background: var(--cyan); opacity: .8; }
.ls-card.ls-scholarly-result::before { background: #8b5cf6; opacity: .8; }
.ls-card:hover {
  border-color: rgba(0,194,255,0.22);
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.ls-card.ls-scholarly-result:hover { border-color: rgba(139,92,246,0.3); }
.ls-inner { padding: 13px 16px 11px 20px; }

/* ── META ROW ── */
.ls-meta {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap; margin-bottom: 6px;
}
.ls-db-badge {
  font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px;
  letter-spacing: .06em; text-transform: uppercase; white-space: nowrap;
}
.ls-db-gn    { background:rgba(0,194,255,0.12);  color:#00c2ff;  border:1px solid rgba(0,194,255,0.28); }
.ls-db-oa    { background:rgba(99,102,241,0.14);  color:#a5b4fc;  border:1px solid rgba(99,102,241,0.3); }
.ls-db-ss    { background:rgba(16,185,129,0.12);  color:#34d399;  border:1px solid rgba(16,185,129,0.25); }
.ls-db-pm    { background:rgba(239,68,68,0.12);   color:#f87171;  border:1px solid rgba(239,68,68,0.25); }
.ls-db-doaj  { background:rgba(245,158,11,0.12);  color:#fbbf24;  border:1px solid rgba(245,158,11,0.25); }
.ls-db-arxiv { background:rgba(0,194,255,0.10);   color:#00c2ff;  border:1px solid rgba(0,194,255,0.22); }

/* ── TITLE, ABSTRACT, WHY ── */
.ls-title {
  font-size: 14px; font-weight: 600; color: var(--white);
  line-height: 1.45; margin-bottom: 6px;
  cursor: pointer; transition: color .15s;
}
.ls-title:hover { color: var(--cyan); text-decoration: underline; text-underline-offset: 3px; }
.ls-abstract {
  font-size: 12px; color: var(--muted); line-height: 1.65; margin-bottom: 8px;
}
.ls-why {
  font-size: 11px; color: #5ba3d4; font-style: italic;
  padding: 5px 10px; margin-bottom: 8px;
  background: rgba(0,194,255,0.05);
  border-left: 2px solid rgba(0,194,255,0.3);
  border-radius: 0 5px 5px 0; line-height: 1.55;
}

/* ── FOOTER ── */
.ls-footer {
  display: flex; align-items: center; gap: 7px;
  flex-wrap: wrap; padding-top: 7px;
  border-top: 1px solid rgba(255,255,255,.04);
}
.ls-date { font-size: 10px; color: var(--dim); font-family: 'IBM Plex Mono', monospace; }

/* ── SOURCES SCANNED STRIP ── */
.ls-sources-strip {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: rgba(0,0,0,.2); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 10px; flex-wrap: wrap;
}
.ls-src-chip {
  font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 3px;
  letter-spacing: .05em; text-transform: uppercase;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
  color: var(--dim);
}
.ls-src-chip.ok { background:rgba(16,185,129,0.1); border-color:rgba(16,185,129,0.25); color:#34d399; }

/* ── STATUS INDICATOR ── */
.ls-status-bar {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--muted);
  min-height: 22px; margin-bottom: 8px;
}

/* Light-mode overrides */
body.light-mode .ls-form-card { background: rgba(255,255,255,.97); border-color: rgba(0,119,170,.2); }
body.light-mode .ls-form-card.ls-scholarly-card { border-color: rgba(99,102,241,.2); }
body.light-mode .ls-card { background: rgba(255,255,255,.97); border-color: rgba(0,0,0,.09); }
body.light-mode .ls-title { color: #0f1f35; }
body.light-mode .ls-abstract { color: #3a5a78; }
body.light-mode .ls-why { background: rgba(0,119,170,.06); border-left-color: rgba(0,119,170,.3); color: #0a4d6e; }
body.light-mode .ls-date { color: #7a9ab8; }

</style>

<script id="live-search-js">

/* ══════════════════════════════════════════════════════════════════════════
   LIVE SEARCH — SHARED HELPERS
══════════════════════════════════════════════════════════════════════════ */

var _nlsResults = [];   // news search results
var _slsResults = [];   // scholarly search results
var _nlsBusy    = false;
var _slsBusy    = false;

/* ── DB badge CSS class ── */
function _lsDbClass(db) {
  var d = (db || '').toLowerCase();
  if (d.includes('google'))    return 'ls-db-gn';
  if (d.includes('openalex'))  return 'ls-db-oa';
  if (d.includes('semantic'))  return 'ls-db-ss';
  if (d.includes('pubmed'))    return 'ls-db-pm';
  if (d.includes('doaj'))      return 'ls-db-doaj';
  if (d.includes('arxiv'))     return 'ls-db-arxiv';
  return 'ls-db-gn';
}

/* ── Skeleton loader ── */
function _lsSkeletons(containerId, n) {
  var el = document.getElementById(containerId);
  if (!el) return;
  var h = '';
  for (var i = 0; i < n; i++) {
    h += '<div class="skeleton-card">'
      + '<div class="skeleton" style="width:24%;height:10px;margin-bottom:8px"></div>'
      + '<div class="skeleton" style="width:90%;height:14px;margin-bottom:6px"></div>'
      + '<div class="skeleton" style="width:68%;height:12px;margin-bottom:10px"></div>'
      + '<div class="skeleton" style="width:44%;height:10px"></div>'
      + '</div>';
  }
  el.innerHTML = h;
}

/* ── Sources scanned strip ── */
function _lsSourcesStrip(queried, allSources) {
  return '<div class="ls-sources-strip">'
    + '<span style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-right:4px;flex-shrink:0">Searched:</span>'
    + allSources.map(function(s) {
        var ok = queried.indexOf(s) > -1;
        return '<span class="ls-src-chip' + (ok ? ' ok' : '') + '">' + s + '</span>';
      }).join('')
    + '</div>';
}

/* ── Build a single result card ── */
function _lsBuildCard(r, idx, typeClass, saveFn, stageFn) {
  var dbClass  = _lsDbClass(r.database || '');
  var _age     = r.pub_date ? (Date.now() - new Date(r.pub_date)) / 864e5 : 999;
  var ageBadge = _age < 1
    ? '<span class="age-badge age-today">&#x1F7E2; Today</span>'
    : _age < 7 ? '<span class="age-badge age-week">&#x1F7E1; This week</span>' : '';

  var abstract = r.abstract || '';
  var shortAbs = abstract.length > 180 ? abstract.slice(0, 180) + '\u2026' : abstract;

  var rawTags = r.tags || [];
  if (typeof rawTags === 'string') rawTags = rawTags.split(',');
  var tagHtml = rawTags.filter(function(t){ return t && t.trim(); }).slice(0, 4).map(function(t) {
    return '<span class="tag tag-domain" style="font-size:9px">' + escHtml(t.trim()) + '</span>';
  }).join('');

  var relBadge  = r.relevance  ? '<span class="relevance-badge">' + rEmoji(r.relevance) + ' ' + r.relevance + '/10</span>' : '';
  var sentBadge = r.sentiment  ? '<span class="sentiment-badge">' + sIcon(r.sentiment) + ' ' + r.sentiment + '</span>' : '';
  var jurBadge  = r.jurisdiction ? '<span class="tag tag-juris">' + escHtml(r.jurisdiction) + '</span>' : '';
  var domBadge  = r.domain     ? '<span class="tag tag-domain">' + escHtml(r.domain) + '</span>' : '';
  var oaBadge   = r.open_access ? '<span class="oa-badge">&#x1F513; OA</span>' : '';
  var doiLink   = r.doi
    ? '<a href="https://doi.org/' + encodeURIComponent((r.doi||'').replace('https://doi.org/',''))
      + '" target="_blank" rel="noopener" class="btn-copy-url btn-sm" style="color:var(--cyan);text-decoration:none;font-size:10px" onclick="event.stopPropagation()">DOI &#x2197;</a>'
    : '';

  return '<div class="ls-card ' + typeClass + '">'
    + '<div class="ls-inner">'
    /* meta */
    + '<div class="ls-meta">'
    +   '<span class="ls-db-badge ' + dbClass + '">' + escHtml(r.database || '') + '</span>'
    +   oaBadge
    +   '<span style="font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)">' + escHtml(r.source || '') + '</span>'
    +   ageBadge + domBadge + jurBadge + relBadge + sentBadge
    + '</div>'
    /* title */
    + '<div class="ls-title" onclick="window.open(' + "'" + escHtml(r.url) + "'" + ',\'_blank\')">'
    +   escHtml(r.title) + ' &#x2197;'
    + '</div>'
    /* authors */
    + (r.authors ? '<div style="font-size:10px;color:var(--dim);margin-bottom:4px;font-family:\'IBM Plex Mono\',monospace">&#x270D; ' + escHtml(r.authors) + '</div>' : '')
    /* abstract */
    + (shortAbs ? '<div class="ls-abstract">' + escHtml(shortAbs) + '</div>' : '')
    /* why */
    + (r.why_it_matters ? '<div class="ls-why">&#x1F4A1; ' + escHtml(r.why_it_matters) + '</div>' : '')
    /* tags */
    + (tagHtml ? '<div style="margin-bottom:7px;display:flex;gap:4px;flex-wrap:wrap">' + tagHtml + '</div>' : '')
    /* footer */
    + '<div class="ls-footer">'
    +   (r.pub_date ? '<span class="ls-date">&#x1F4C5; ' + r.pub_date + '</span>' : '')
    +   doiLink
    +   '<div style="margin-left:auto;display:flex;gap:6px">'
    +     '<a href="' + escHtml(r.url) + '" target="_blank" rel="noopener" '
    +       'class="btn btn-ghost btn-sm" style="font-size:10px;padding:3px 9px">Open &#x2197;</a>'
    +     '<button class="btn btn-green btn-sm" style="font-size:10px;padding:3px 9px" '
    +       'onclick="' + saveFn + '(' + idx + ')">+ Save to Feed</button>'
    +     '<button class="btn btn-gold btn-sm" style="font-size:10px;padding:3px 9px" '
    +       'onclick="' + stageFn + '(' + idx + ')">+ Stage Digest</button>'
    +   '</div>'
    + '</div>'
    + '</div>'
    + '</div>';
}

/* ── Save a result to the backend ── */
async function _lsSave(result) {
  if (!API_BASE) {
    showToast('&#x128268;', 'No Backend', 'Connect Railway to save articles.', 4000);
    return false;
  }
  try {
    var resp = await fetch(API_BASE + '/live-search/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(result),
    });
    var data = await resp.json();
    return data;
  } catch (e) {
    showToast('&#x26A0;', 'Save Failed', e.message, 4000);
    return null;
  }
}

/* ── Stage a result into the digest (client-side only) ── */
function _lsStage(result) {
  var fake = {
    id:           -(Date.now()),   // negative so it won't clash with real DB ids
    title:        result.title,
    url:          result.url,
    source:       result.source || result.database || 'Live Search',
    jurisdiction: result.jurisdiction || 'Unknown',
    domain:       result.domain || 'Other',
    relevance:    result.relevance || 6,
    sentiment:    result.sentiment || 'Neutral',
    summary:      result.summary || result.abstract || '',
    whyItMatters: result.why_it_matters || '',
    pub_date:     result.pub_date || '',
    pubDate:      result.pub_date || '',
    read:         false,
    staged:       false,
    tags:         (typeof result.tags === 'string' ? result.tags : (result.tags||[]).join(',')),
  };
  articles.push(fake);
  toggleStage(fake.id);
  showToast('&#x1F4C4;', 'Staged', '"' + result.title.slice(0, 50) + '\u2026" added to digest.', 3000);
}

/* ── Patch scraperTab to handle 'livesearch' ── */
var _origScraperTab = typeof scraperTab === 'function' ? scraperTab : null;
scraperTab = function(t) {

};

researchTab = function(t) {

function nlsQuick(q) {
  var inp = document.getElementById('nls-query');
  if (inp) inp.value = q;
  nlsSearch();
}

async function nlsSearch() {
  if (_nlsBusy) return;
  var query = ((document.getElementById('nls-query') || {}).value || '').trim();
  if (!query) { showToast('&#x26A0;', 'Enter keywords', 'Type a search query first.', 3000); return; }
  if (!API_BASE) { showToast('&#x128268;', 'No Backend', 'Connect Railway to enable Live Search.', 5000); return; }

  _nlsBusy    = true;
  _nlsResults = [];

  var btn = document.getElementById('nls-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin">&#8635;</span> Searching\u2026'; }

  var statusEl = document.getElementById('nls-status');
  if (statusEl) statusEl.innerHTML = '<span class="spin" style="display:inline-block">&#8635;</span>&nbsp; Searching Google News + running AI analysis\u2026';

  _lsSkeletons('nls-list', 4);
  var hdr = document.getElementById('nls-results-header');
  if (hdr) hdr.style.display = 'none';
  var saveAllBtn = document.getElementById('nls-save-all');
  if (saveAllBtn) saveAllBtn.style.display = 'none';

  try {
    var resp = await fetch(API_BASE + '/live-search/news', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query:         query,
        region:        (document.getElementById('nls-region')       || {}).value || 'Canada (National)',
        jurisdiction:  (document.getElementById('nls-jurisdiction') || {}).value || '',
        domain:        (document.getElementById('nls-domain')       || {}).value || '',
        source_type:   (document.getElementById('nls-source-type') || {}).value || 'All',
        date_from:     (document.getElementById('nls-date-from')   || {}).value || null,
        date_to:       (document.getElementById('nls-date-to')     || {}).value || null,
        min_relevance: parseInt((document.getElementById('nls-min-rel') || {}).value || '5'),
        max_results:   parseInt((document.getElementById('nls-max-results') || {}).value || '20'),
      }),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();

    _nlsResults = data.results || [];

    var t = data.query_time_s ? ' \u00B7 ' + data.query_time_s + 's' : '';
    if (statusEl) statusEl.innerHTML =
      '<span style="color:var(--green)">&#x2713;</span>&nbsp; '
      + _nlsResults.length + ' results' + t;

    if (hdr) hdr.style.display = 'flex';
    nlsRender();
    if (_nlsResults.length && saveAllBtn) saveAllBtn.style.display = 'inline-flex';

    if (typeof gtag !== 'undefined')
      gtag('event', 'news_live_search', { event_category: 'LiveSearch', event_label: query });

  } catch (e) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">&#x26A0;</span>&nbsp; ' + e.message;
    var list = document.getElementById('nls-list');
    if (list) list.innerHTML = '<div class="empty"><div class="empty-icon">&#x26A0;</div>'
      + '<div class="empty-text">Search failed: ' + escHtml(e.message)
      + '<br>Check your Railway backend is connected and live_search.py is deployed.</div></div>';
  } finally {
    _nlsBusy = false;
    if (btn) { btn.disabled = false; btn.innerHTML = '&#x2315; Search'; }
  }
}

function nlsRender() {
  var list    = document.getElementById('nls-list');
  var countEl = document.getElementById('nls-count');
  var metaEl  = document.getElementById('nls-meta');
  if (!list) return;

  var sortV = (document.getElementById('nls-sort') || {}).value || 'relevance';
  var items = _nlsResults.slice();

  items.sort(function(a, b) {
    if (sortV === 'relevance')  return (b.relevance || 0) - (a.relevance || 0);
    if (sortV === 'date_asc')   return (a.pub_date || '') < (b.pub_date || '') ? -1 : 1;
    return (b.pub_date || '') < (a.pub_date || '') ? -1 : 1;
  });

  if (countEl) countEl.textContent = items.length + ' result' + (items.length !== 1 ? 's' : '');
  if (metaEl)  metaEl.textContent  = 'from Google News';

  if (!items.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">&#x1F50D;</div>'
      + '<div class="empty-text">No results matched your filters.<br>'
      + 'Try broadening the query, lowering Min Relevance, or changing the region.</div></div>';
    return;
  }

  list.innerHTML = _lsSourcesStrip(['Google News'], ['Google News'])
    + items.map(function(r, i) {
        return _lsBuildCard(r, i, 'ls-news-card', 'nlsSaveOne', 'nlsStageOne');
      }).join('');
}

async function nlsSaveOne(idx) {
  var r = _nlsResults[idx];
  if (!r) return;
  var data = await _lsSave(r);
  if (!data) return;
  if (data.duplicate) showToast('&#x2139;', 'Already Saved', '"' + r.title.slice(0, 55) + '\u2026" is already in your feed.', 3000);
  else {
    showToast('&#x2705;', 'Saved to News Feed', '"' + r.title.slice(0, 55) + '\u2026" added.', 3000);
    if (typeof apiLoadArticles === 'function') { _articleCache = []; _cacheTime = 0; apiLoadArticles({ limit: 100 }); }
  }
}

function nlsStageOne(idx) {
  var r = _nlsResults[idx]; if (!r) return;
  _lsStage(r);
}

async function nlsSaveAll() {
  if (!_nlsResults.length) return;
  var saved = 0, dupes = 0;
  for (var i = 0; i < _nlsResults.length; i++) {
    var d = await _lsSave(_nlsResults[i]);
    if (d) { if (d.duplicate) dupes++; else saved++; }
  }
  showToast('&#x1F4BE;', 'Batch Save', saved + ' saved, ' + dupes + ' already in feed.', 4000);
  if (saved > 0 && typeof apiLoadArticles === 'function') {
    _articleCache = []; _cacheTime = 0; apiLoadArticles({ limit: 100 });
  }
}

function nlsClear() {
  _nlsResults = [];
  var els = ['nls-list', 'nls-status', 'nls-count', 'nls-meta'];
  els.forEach(function(id) { var e = document.getElementById(id); if (e) e.innerHTML = ''; });
  var hdr = document.getElementById('nls-results-header');
  if (hdr) hdr.style.display = 'none';
  var btn = document.getElementById('nls-save-all');
  if (btn) btn.style.display = 'none';
  var inp = document.getElementById('nls-query');
  if (inp) inp.value = '';
}

  });
}

  document.querySelectorAll('#sls-db-toggles .ls-db-toggle.active').forEach(function(el) {
    out.push(el.getAttribute('data-db'));

  return out;
}

function slsQuick(q) {

async function slsSearch() {
  if (_slsBusy) return;
  var query = ((document.getElementById('sls-query') || {}).value || '').trim();
  if (!query) { showToast('&#x26A0;', 'Enter keywords', 'Type a search query first.', 3000); return; }
  if (!API_BASE) { showToast('&#x128268;', 'No Backend', 'Connect Railway to enable Live Search.', 5000); return; }

  var activeDbs = slsGetActiveDbs();

  _lsSkeletons('sls-list', 5);

        databases:     activeDbs,
        domain:        (document.getElementById('sls-domain')   || {}).value || '',
        date_from:     (document.getElementById('sls-date-from')|| {}).value || null,
        date_to:       (document.getElementById('sls-date-to')  || {}).value || null,
        min_relevance: parseInt((document.getElementById('sls-min-rel')      || {}).value || '5'),
        max_results:   parseInt((document.getElementById('sls-max-results')  || {}).value || '15'),
      }),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();

  } finally {
    _slsBusy = false;
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '&#x2315; Search';
    }
  }
}

function slsRender(queriedSources) {
  var list    = document.getElementById('sls-list');
  var countEl = document.getElementById('sls-count');
  var metaEl  = document.getElementById('sls-meta');
  if (!list) return;

  var sortV = (document.getElementById('sls-sort') || {}).value || 'relevance';
  var items = _slsResults.slice();

  items.sort(function(a, b) {
    if (sortV === 'relevance') return (b.relevance || 0) - (a.relevance || 0);
    if (sortV === 'date_asc')  return (a.pub_date || '') < (b.pub_date || '') ? -1 : 1;
    return (b.pub_date || '') < (a.pub_date || '') ? -1 : 1;
  });

  var ALL_DBS = ['OpenAlex', 'Semantic Scholar', 'PubMed Central', 'DOAJ', 'arXiv'];
  var queried = queriedSources || (items.map(function(r){ return r.database; }).filter(Boolean));

  if (countEl) countEl.textContent = items.length + ' result' + (items.length !== 1 ? 's' : '');
  if (metaEl)  metaEl.textContent  = 'from ' + (queried.length ? queried.join(', ') : 'open-access databases');

  if (!items.length) {
    list.innerHTML = _lsSourcesStrip(queried, ALL_DBS)
      + '<div class="empty"><div class="empty-icon">&#x1F4DA;</div>'
      + '<div class="empty-text">No results above your relevance threshold.<br>'
      + 'Try lowering Min Relevance, broadening the query, or selecting more databases.</div></div>';
    return;
  }

  list.innerHTML = _lsSourcesStrip(queried, ALL_DBS)
    + items.map(function(r, i) {
        return _lsBuildCard(r, i, 'ls-scholarly-result', 'slsSaveOne', 'slsStageOne');
      }).join('');
}
